name: website
description: >-
  Side-by-side comparison site (mermaid.js vs the Dart port), built with Jaspr.
  The Dart renderer is embedded directly via jaspr_flutter_embed — no separate
  Flutter web build step.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: '>=3.35.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  jaspr_flutter_embed: ^0.4.11
  # Standalone ELK layered layout — drives the /elk demo page (no mermaid).
  elk_layout: ^0.1.0
  mermaid_core: ^0.1.0
  mermaid_flutter: ^0.1.0
  mermaid_samples: ^0.1.0
  universal_web: ^1.1.0
  jaspr_router: ^0.8.2

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_lints: ^6.0.0
  jaspr_builder: ^0.23.1

jaspr:
  mode: static
  # Port for the static-build crawl server (default 8080 is often taken).
  port: 8091
  # `jaspr build` runs the Flutter web build internally and wires the embed —
  # no standalone `flutter build web` / tracked main.dart.js artifact.
  flutter: embedded

flutter:
  uses-material-design: true
  fonts:
    - family: KaTeX_Main
      fonts:
        - asset: fonts/KaTeX_Main-Regular.ttf
    - family: KaTeX_Math
      fonts:
        - asset: fonts/KaTeX_Math-Italic.ttf

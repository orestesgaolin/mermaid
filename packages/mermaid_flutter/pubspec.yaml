name: mermaid_flutter
description: >-
  Flutter renderer for mermaid_core: TextPainter-based text measurement and a
  CustomPainter that paints the mermaid render scene natively.
version: 0.1.0
publish_to: none
environment:
  sdk: ^3.12.0
  flutter: '>=3.35.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  mermaid_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

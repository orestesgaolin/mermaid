name: elk_layout
description: >-
  Pure Dart layered graph layout (Sugiyama-style), inspired by the Eclipse
  Layout Kernel. Compound/hierarchical graphs, ports and orthogonal edge
  routing, with an elkjs-style graph API. No Flutter, no I/O — runs anywhere.
version: 0.1.0
repository: https://github.com/orestesgaolin/mermaid
issue_tracker: https://github.com/orestesgaolin/mermaid/issues
topics:
  - layout
  - graph
  - elk
  - diagram
  - visualization
environment:
  sdk: ^3.12.0
resolution: workspace

dependencies:
  meta: ^1.16.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

name: mermaid_core
description: >-
  Pure Dart port of mermaid.js: detect, parse and lay out 15 diagram types
  into a backend-agnostic scene, with an SVG renderer and a CLI. No Flutter.
version: 0.1.0
repository: https://github.com/makevisible/mermaid_dart
issue_tracker: https://github.com/makevisible/mermaid_dart/issues
topics:
  - mermaid
  - diagram
  - svg
  - visualization
environment:
  sdk: ^3.12.0
resolution: workspace

executables:
  mermaid_dart: mermaid

dependencies:
  meta: ^1.16.0
  path_parsing: ^1.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

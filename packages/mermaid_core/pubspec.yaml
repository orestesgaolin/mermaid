name: mermaid_core
description: >-
  Pure Dart port of mermaid.js: detect, parse and lay out 28 diagram types
  into a backend-agnostic scene, with an SVG renderer and a CLI. No Flutter.
version: 0.1.0
repository: https://github.com/orestesgaolin/mermaid
issue_tracker: https://github.com/orestesgaolin/mermaid/issues
topics:
  - mermaid
  - diagram
  - svg
  - visualization
environment:
  sdk: ^3.12.0
resolution: workspace

executables:
  mermaid_dart: mermaid

dependencies:
  meta: ^1.16.0
  path_parsing: ^1.1.0
  # Standalone pure-Dart ELK-style layered layout (workspace package), used by
  # the flowchart `layout: elk` engine.
  elk:
    path: ../elk
  # Pure-Dart KaTeX port: drives math layout via its box tree.
  # TODO: once the katex core package is published (under a free pub.dev name,
  # e.g. katex_dart), depend on the hosted version here and move this path to a
  # `dependency_overrides:` entry for local co-development — that keeps
  # mermaid_core publishable (overrides are stripped on publish).
  katex:
    path: ../../../katex/packages/katex

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
